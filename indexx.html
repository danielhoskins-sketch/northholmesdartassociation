<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#060b14"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="AirTMS"/>
  <meta name="description" content="AirTMS — Air Courier Transportation Management System"/>
  <link rel="manifest" href="manifest.json"/>
  <title>AirTMS — Air Courier TMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#060b14;--surface:#0d1a2d;--surface2:#112240;--surface3:#162b50;
      --border:#1e3a5f;--border2:#2a4f7a;
      --primary:#38bdf8;--primary-dim:rgba(56,189,248,0.12);--primary-glow:rgba(56,189,248,0.25);
      --accent:#f59e0b;--success:#22c55e;--danger:#ef4444;--warning:#f97316;
      --text:#dde8f8;--text2:#a8c0dc;--muted:#5a7a9e;
      --font-d:'Syne',sans-serif;--font-b:'IBM Plex Sans',sans-serif;--font-m:'JetBrains Mono',monospace;
      --radius:10px;
    }
    html,body{height:100%}
    body{background:var(--bg);color:var(--text);font-family:var(--font-b);line-height:1.5;-webkit-font-smoothing:antialiased}
    #root{min-height:100vh}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:var(--surface)}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
    input:focus,textarea:focus,select:focus{outline:none;border-color:var(--primary)!important;box-shadow:0 0 0 3px var(--primary-dim)}
    button{font-family:var(--font-b)}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.96)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .fade-in{animation:fadeIn .25s ease both}
    .slide-in{animation:slideIn .2s ease both}
    *{-webkit-tap-highlight-color:transparent}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
    @media(max-width:540px){.grid-2,.grid-3{grid-template-columns:1fr}.hide-mobile{display:none!important}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useContext,createContext,useCallback,useRef,useMemo}=React;

// ── FIREBASE CONFIG ─────────────────────────────────────────────
const firebaseConfig={
  apiKey: "AIzaSyCciaqourRZmdu41SyeCXo9rXEmNmxW-OM",
  authDomain: "vz-tms.firebaseapp.com",
  projectId: "vz-tms",
  storageBucket: "vz-tms.firebasestorage.app",
  messagingSenderId: "463680773807",
  appId: "1:463680773807:web:1838c7c281f09da54bbe5a"
};
const IS_CFG=firebaseConfig.apiKey!=="YOUR_API_KEY";
let auth,db;
if(IS_CFG){firebase.initializeApp(firebaseConfig);auth=firebase.auth();db=firebase.firestore();}

// ── CONSTANTS ────────────────────────────────────────────────────
const SEG_TYPES={
  GROUND_PICKUP:   {label:"Ground Pickup",   icon:"🚗",color:"#3b82f6"},
  AIRPORT_CHECKIN: {label:"Airport Check-In",icon:"🏢",color:"#8b5cf6"},
  FLIGHT_LEG:      {label:"Flight Leg",      icon:"✈", color:"#38bdf8"},
  AIRPORT_RECOVERY:{label:"Airport Recovery",icon:"📦",color:"#f97316"},
  FINAL_DELIVERY:  {label:"Final Delivery",  icon:"🏁",color:"#22c55e"},
};
const SEG_STATUS={
  PENDING:    {label:"Pending",   color:"#475569"},
  ASSIGNED:   {label:"Assigned",  color:"#3b82f6"},
  EN_ROUTE:   {label:"En Route",  color:"#f59e0b"},
  IN_PROGRESS:{label:"In Progress",color:"#f97316"},
  COMPLETED:  {label:"Completed", color:"#22c55e"},
  DELAYED:    {label:"Delayed",   color:"#ef4444"},
};
const ORD_STATUS={
  CREATED:   {label:"Created",   color:"#475569"},
  IN_TRANSIT:{label:"In Transit",color:"#38bdf8"},
  DELIVERED: {label:"Delivered", color:"#22c55e"},
  EXCEPTION: {label:"Exception", color:"#ef4444"},
};
const SVC_TYPES=[
  {value:"STANDARD",label:"Standard",    color:"#475569"},
  {value:"PRIORITY",label:"Priority",    color:"#f59e0b"},
  {value:"CRITICAL",label:"Critical / Medical",color:"#ef4444"},
];
const AIRLINE_ICAO={AA:"AAL",UA:"UAL",DL:"DAL",WN:"SWA",B6:"JBU",AS:"ASA",F9:"FFT",NK:"NKS",FX:"FDX",UPS:"UPS"};

// ── UTILS ────────────────────────────────────────────────────────
const genTN=()=>{const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let r="";for(let i=0;i<9;i++)r+=c[Math.floor(Math.random()*c.length)];return`ACX${new Date().getFullYear().toString().slice(-2)}${r}`;};
const fmtDate=ts=>{if(!ts)return"—";const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});};
const fmtTime=ts=>{if(!ts)return"—";const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});};
const callsign=fn=>{const m=fn.match(/^([A-Z]{2,3})(\d+)/i);if(!m)return fn.toUpperCase().replace(/\s/g,"");return(AIRLINE_ICAO[m[1].toUpperCase()]||m[1].toUpperCase())+m[2];};
const svcColor=t=>({STANDARD:"#475569",PRIORITY:"#f59e0b",CRITICAL:"#ef4444"}[t]||"#475569");

const fetchFlight=async(flightNum)=>{
  try{
    const cs=callsign(flightNum.trim());
    const r=await fetch("https://opensky-network.org/api/states/all",{signal:AbortSignal.timeout(9000)});
    if(!r.ok)throw new Error("OpenSky "+r.status);
    const data=await r.json();
    const f=(data.states||[]).find(s=>s[1]&&s[1].trim().toUpperCase()===cs.padEnd(8," ").slice(0,8).toUpperCase());
    if(!f)return{status:"NOT_FOUND"};
    const[,cs2,,,,lon,lat,baro,onGround,vel,track]=f;
    return{status:onGround?"ON_GROUND":"AIRBORNE",callsign:cs2?.trim(),lat,lon,
      alt:baro?Math.round(baro*3.28084):null,spd:vel?Math.round(vel*1.94384):null,hdg:track?Math.round(track):null,onGround};
  }catch(e){return{status:"ERROR",message:e.message};}
};

// ── CONTEXT ──────────────────────────────────────────────────────
const Ctx=createContext(null);
const useApp=()=>useContext(Ctx);

// ── PRIMITIVES ───────────────────────────────────────────────────
const Badge=({status,type="order"})=>{
  const m=type==="segment"?SEG_STATUS:ORD_STATUS;
  const i=m[status]||{label:status,color:"#475569"};
  return <span style={{background:i.color+"20",color:i.color,border:`1px solid ${i.color}45`,padding:"2px 8px",borderRadius:4,fontSize:10,fontFamily:"var(--font-m)",fontWeight:700,letterSpacing:".06em",textTransform:"uppercase",whiteSpace:"nowrap"}}>{i.label}</span>;
};

const Btn=({children,onClick,variant="primary",size="md",disabled,full,style:ex})=>{
  const V={primary:{background:"var(--primary)",color:"#000",border:"none"},secondary:{background:"transparent",color:"var(--primary)",border:"1px solid var(--primary)"},ghost:{background:"transparent",color:"var(--muted)",border:"1px solid var(--border)"},danger:{background:"var(--danger)",color:"#fff",border:"none"},success:{background:"var(--success)",color:"#000",border:"none"},warning:{background:"var(--accent)",color:"#000",border:"none"}};
  const S={xs:{padding:"3px 10px",fontSize:11,borderRadius:5},sm:{padding:"5px 12px",fontSize:12,borderRadius:6},md:{padding:"8px 16px",fontSize:14,borderRadius:7},lg:{padding:"11px 24px",fontSize:15,borderRadius:8}};
  return <button onClick={onClick} disabled={disabled} style={{...V[variant],...S[size],fontFamily:"var(--font-b)",fontWeight:600,cursor:disabled?"not-allowed":"pointer",opacity:disabled?.5:1,transition:"opacity .15s,transform .1s",width:full?"100%":undefined,...ex}}
    onMouseDown={e=>{if(!disabled)e.currentTarget.style.transform="scale(.97)"}}
    onMouseUp={e=>{e.currentTarget.style.transform=""}}
    onMouseLeave={e=>{e.currentTarget.style.transform=""}}>{children}</button>;
};

const iStyle={background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:7,padding:"9px 12px",color:"var(--text)",fontFamily:"var(--font-b)",fontSize:14,width:"100%"};

const Field=({label,children,col,required})=>(
  <div style={{display:"flex",flexDirection:"column",gap:5,gridColumn:col}}>
    {label&&<label style={{fontSize:11,color:"var(--muted)",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",fontFamily:"var(--font-m)"}}>{label}{required?" *":""}</label>}
    {children}
  </div>
);
const TI=({label,value,onChange,type="text",placeholder,required,col,disabled})=>(
  <Field label={label} required={required} col={col}>
    <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} required={required} disabled={disabled} style={{...iStyle,opacity:disabled?.6:1}}/>
  </Field>
);
const SI=({label,value,onChange,options,required,col})=>(
  <Field label={label} required={required} col={col}>
    <select value={value} onChange={e=>onChange(e.target.value)} required={required} style={iStyle}>
      {options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  </Field>
);
const Card=({children,style:ex,onClick,accent})=>(
  <div onClick={onClick} style={{background:"var(--surface)",border:`1px solid var(--border)`,borderLeft:accent?`3px solid ${accent}`:undefined,borderRadius:"var(--radius)",padding:18,cursor:onClick?"pointer":"default",transition:"border-color .15s,background .15s",...ex}}
    onMouseOver={e=>{if(onClick){e.currentTarget.style.borderColor="var(--border2)";e.currentTarget.style.background="var(--surface2)"}}}
    onMouseOut={e=>{if(onClick){e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.background="var(--surface)"}}}>{children}</div>
);
const Modal=({title,onClose,children,width=660})=>(
  <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16,backdropFilter:"blur(6px)"}}
    onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="fade-in" style={{background:"var(--surface)",border:"1px solid var(--border2)",borderRadius:14,width:"100%",maxWidth:width,maxHeight:"92vh",overflow:"auto",boxShadow:"0 24px 80px rgba(0,0,0,.6)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"15px 20px",borderBottom:"1px solid var(--border)",position:"sticky",top:0,background:"var(--surface)",zIndex:2}}>
        <h3 style={{fontFamily:"var(--font-d)",fontSize:17,fontWeight:700}}>{title}</h3>
        <button onClick={onClose} style={{background:"none",border:"none",color:"var(--muted)",fontSize:22,cursor:"pointer",lineHeight:1}}>×</button>
      </div>
      <div style={{padding:20}}>{children}</div>
    </div>
  </div>
);
const Divider=({label})=>(
  <div style={{display:"flex",alignItems:"center",gap:10,margin:"20px 0 14px"}}>
    {label&&<span style={{fontSize:10,color:"var(--muted)",fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:".1em",whiteSpace:"nowrap"}}>{label}</span>}
    <div style={{flex:1,height:1,background:"var(--border)"}}/>
  </div>
);
const Spinner=({size=28})=>(
  <div style={{width:size,height:size,border:"2.5px solid var(--border)",borderTop:"2.5px solid var(--primary)",borderRadius:"50%",animation:"spin .7s linear infinite"}}/>
);

// ── FLIGHT STATUS PANEL ──────────────────────────────────────────
const FlightPanel=({flightNumber})=>{
  const[data,setData]=useState(null);
  const[loading,setLoad]=useState(false);
  const[lastR,setLastR]=useState(null);
  const refresh=useCallback(async()=>{
    if(!flightNumber?.trim())return;
    setLoad(true);
    const r=await fetchFlight(flightNumber.trim());
    setData(r);setLastR(new Date());setLoad(false);
  },[flightNumber]);
  useEffect(()=>{refresh();const iv=setInterval(refresh,60000);return()=>clearInterval(iv);},[refresh]);
  if(!flightNumber?.trim())return null;
  return(
    <div style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:8,padding:14,marginTop:10,borderLeft:"3px solid var(--primary)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <span style={{fontSize:13,fontWeight:700,color:"var(--primary)",fontFamily:"var(--font-m)"}}>✈ {flightNumber.toUpperCase()} — OpenSky Live</span>
        <button onClick={refresh} disabled={loading} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:17,display:"inline-block",animation:loading?"spin .7s linear infinite":"none"}}>↻</button>
      </div>
      {loading&&!data&&<div style={{color:"var(--muted)",fontSize:13}}>Querying OpenSky Network…</div>}
      {data&&(<>
        {data.status==="NOT_FOUND"&&<p style={{color:"var(--accent)",fontSize:13}}>⚠ Not in live ADS-B data — flight may not be airborne yet or outside coverage.</p>}
        {data.status==="ERROR"&&<p style={{color:"var(--danger)",fontSize:13}}>✕ {data.message}</p>}
        {(data.status==="AIRBORNE"||data.status==="ON_GROUND")&&(
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
            {[
              {k:"STATUS",v:data.onGround?"🛬 On Ground":"✈ Airborne",c:data.onGround?"var(--success)":"var(--primary)"},
              {k:"ALTITUDE",v:data.alt!=null?`${data.alt.toLocaleString()} ft`:"—"},
              {k:"SPEED",v:data.spd!=null?`${data.spd} kts`:"—"},
              {k:"HEADING",v:data.hdg!=null?`${data.hdg}°`:"—"},
            ].map(x=>(
              <div key={x.k} style={{background:"var(--surface)",borderRadius:6,padding:"7px 10px",textAlign:"center"}}>
                <div style={{fontSize:9,color:"var(--muted)",fontFamily:"var(--font-m)",marginBottom:3}}>{x.k}</div>
                <div style={{fontSize:13,fontWeight:700,color:x.c||"var(--text)",fontFamily:"var(--font-m)"}}>{x.v}</div>
              </div>
            ))}
          </div>
        )}
        {lastR&&<p style={{fontSize:10,color:"var(--muted)",marginTop:8,fontFamily:"var(--font-m)"}}>Updated {lastR.toLocaleTimeString()} · Refreshes every 60s</p>}
      </>)}
    </div>
  );
};

// ── SEGMENT BUILDER ──────────────────────────────────────────────
const SegmentBuilder=({segments,onChange})=>{
  const add=t=>onChange([...segments,{_id:Date.now()+Math.random(),type:t,fromLocation:"",toLocation:"",flightNumber:"",departureAirport:"",arrivalAirport:"",scheduledDeparture:"",notes:""}]);
  const upd=(id,f,v)=>onChange(segments.map(s=>s._id===id?{...s,[f]:v}:s));
  const del=id=>onChange(segments.filter(s=>s._id!==id));
  return(
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
        <span style={{fontSize:12,color:"var(--muted)",alignSelf:"center",marginRight:4}}>Add segment:</span>
        {Object.entries(SEG_TYPES).map(([t,info])=>(
          <button key={t} onClick={()=>add(t)} style={{padding:"5px 12px",borderRadius:6,border:"1px dashed var(--border2)",background:"transparent",color:"var(--text2)",cursor:"pointer",fontSize:12,transition:"border-color .12s,color .12s"}}
            onMouseOver={e=>{e.currentTarget.style.borderColor=info.color;e.currentTarget.style.color=info.color}}
            onMouseOut={e=>{e.currentTarget.style.borderColor="var(--border2)";e.currentTarget.style.color="var(--text2)"}}
          >+ {info.icon} {info.label}</button>
        ))}
      </div>
      {segments.length===0&&<div style={{border:"1px dashed var(--border)",borderRadius:8,padding:"24px 20px",textAlign:"center",color:"var(--muted)",fontSize:13}}>No segments yet — add them above to define the full door-to-door route.</div>}
      {segments.map((seg,idx)=>{
        const ti=SEG_TYPES[seg.type];
        return(
          <div key={seg._id} className="slide-in" style={{background:"var(--surface2)",border:"1px solid var(--border)",borderLeft:`3px solid ${ti.color}`,borderRadius:8,padding:14,marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontSize:13,fontWeight:700}}>{idx+1}. {ti.icon} {ti.label}</span>
              <button onClick={()=>del(seg._id)} style={{background:"none",border:"none",color:"var(--danger)",cursor:"pointer",fontSize:12,fontWeight:600}}>✕ Remove</button>
            </div>
            <div className="grid-2">
              <TI label="From" value={seg.fromLocation} onChange={v=>upd(seg._id,"fromLocation",v)} placeholder="Address or airport code"/>
              <TI label="To"   value={seg.toLocation}   onChange={v=>upd(seg._id,"toLocation",v)}   placeholder="Address or airport code"/>
              {seg.type==="FLIGHT_LEG"&&<>
                <TI label="Flight Number"     value={seg.flightNumber}      onChange={v=>upd(seg._id,"flightNumber",v)}      placeholder="e.g. AA1234"/>
                <TI label="Departure Airport" value={seg.departureAirport}  onChange={v=>upd(seg._id,"departureAirport",v)}  placeholder="IATA e.g. STL"/>
                <TI label="Arrival Airport"   value={seg.arrivalAirport}    onChange={v=>upd(seg._id,"arrivalAirport",v)}    placeholder="IATA e.g. PHX"/>
                <TI label="Sched. Departure"  value={seg.scheduledDeparture} onChange={v=>upd(seg._id,"scheduledDeparture",v)} type="datetime-local"/>
              </>}
            </div>
            <div style={{marginTop:10}}>
              <TI label="Notes / Special Handling" value={seg.notes} onChange={v=>upd(seg._id,"notes",v)} placeholder="Fragile, temp-controlled, STAT medical…"/>
            </div>
          </div>
        );
      })}
    </div>
  );
};

// ── CREATE ORDER MODAL ───────────────────────────────────────────
const CreateOrderModal=({onClose,onCreated})=>{
  const{user}=useApp();
  const[step,setStep]=useState(1);
  const[busy,setBusy]=useState(false);
  const[err,setErr]=useState("");
  const[segs,setSegs]=useState([]);
  const[f,setF]=useState({customerName:"",customerEmail:"",customerPhone:"",customerCompany:"",originAddress:"",originCity:"",originState:"",destAddress:"",destCity:"",destState:"",pieces:"1",weight:"",serviceType:"PRIORITY",notes:""});
  const sf=(k,v)=>setF(p=>({...p,[k]:v}));

  const create=async()=>{
    if(!f.customerName){setErr("Customer name required.");return;}
    if(!segs.length){setErr("Add at least one segment.");return;}
    setBusy(true);setErr("");
    try{
      const tn=genTN();
      const oRef=db.collection("orders").doc();
      const batch=db.batch();
      const segIds=[];
      segs.forEach((seg,idx)=>{
        const sRef=db.collection("segments").doc();
        segIds.push(sRef.id);
        batch.set(sRef,{orderId:oRef.id,segmentIndex:idx,type:seg.type,status:"PENDING",
          fromLocation:seg.fromLocation,toLocation:seg.toLocation,
          flightNumber:seg.flightNumber||null,departureAirport:seg.departureAirport||null,
          arrivalAirport:seg.arrivalAirport||null,scheduledDeparture:seg.scheduledDeparture||null,
          notes:seg.notes||"",assignedTo:null,history:[],
          createdAt:firebase.firestore.FieldValue.serverTimestamp(),
          updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
      });
      batch.set(oRef,{trackingNumber:tn,status:"CREATED",
        customer:{name:f.customerName,email:f.customerEmail,phone:f.customerPhone,company:f.customerCompany},
        origin:{address:f.originAddress,city:f.originCity,state:f.originState},
        destination:{address:f.destAddress,city:f.destCity,state:f.destState},
        pieces:Number(f.pieces),weight:f.weight,serviceType:f.serviceType,notes:f.notes,
        createdBy:user.uid,segmentIds:segIds,currentSegmentIndex:0,
        createdAt:firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
      await batch.commit();
      onCreated(tn);
    }catch(e){setErr(e.message);setBusy(false);}
  };

  return(
    <Modal title="Create New Order" onClose={onClose} width={740}>
      <div style={{display:"flex",gap:8,marginBottom:22}}>
        {[{n:1,l:"Order Details"},{n:2,l:"Route & Segments"}].map(s=>(
          <button key={s.n} onClick={()=>setStep(s.n)} style={{flex:1,padding:"9px 12px",borderRadius:7,cursor:"pointer",
            background:step===s.n?"var(--primary-dim)":"var(--surface2)",
            border:`1px solid ${step===s.n?"var(--primary)":"var(--border)"}`,
            color:step===s.n?"var(--primary)":"var(--muted)",
            fontFamily:"var(--font-b)",fontWeight:600,fontSize:13}}>
            <span style={{fontFamily:"var(--font-m)",fontSize:10}}>0{s.n} </span>{s.l}
          </button>
        ))}
      </div>
      {step===1&&(
        <div style={{display:"flex",flexDirection:"column",gap:18}}>
          <Divider label="Customer"/>
          <div className="grid-2">
            <TI label="Customer Name"  value={f.customerName}    onChange={v=>sf("customerName",v)}    required placeholder="Jane Smith"/>
            <TI label="Company"        value={f.customerCompany} onChange={v=>sf("customerCompany",v)} placeholder="Acme Hospital"/>
            <TI label="Email"          value={f.customerEmail}   onChange={v=>sf("customerEmail",v)}   type="email"/>
            <TI label="Phone"          value={f.customerPhone}   onChange={v=>sf("customerPhone",v)}   placeholder="+1 (555) 000-0000"/>
          </div>
          <Divider label="Origin"/>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:12}}>
            <TI label="Address" value={f.originAddress} onChange={v=>sf("originAddress",v)} placeholder="123 Main St"/>
            <TI label="City"    value={f.originCity}    onChange={v=>sf("originCity",v)}    placeholder="St. Louis"/>
            <TI label="State"   value={f.originState}   onChange={v=>sf("originState",v)}   placeholder="MO"/>
          </div>
          <Divider label="Destination"/>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:12}}>
            <TI label="Address" value={f.destAddress} onChange={v=>sf("destAddress",v)} placeholder="456 Oak Ave"/>
            <TI label="City"    value={f.destCity}    onChange={v=>sf("destCity",v)}    placeholder="Phoenix"/>
            <TI label="State"   value={f.destState}   onChange={v=>sf("destState",v)}   placeholder="AZ"/>
          </div>
          <Divider label="Shipment"/>
          <div className="grid-3">
            <TI label="Pieces"       value={f.pieces}      onChange={v=>sf("pieces",v)}      type="number"/>
            <TI label="Weight (lbs)" value={f.weight}      onChange={v=>sf("weight",v)}      placeholder="0.0"/>
            <SI label="Service Type" value={f.serviceType} onChange={v=>sf("serviceType",v)} options={SVC_TYPES.map(s=>({value:s.value,label:s.label}))}/>
          </div>
          <Field label="Notes / Special Handling">
            <textarea value={f.notes} onChange={e=>sf("notes",e.target.value)} placeholder="Temp requirements, fragile, STAT medical…" rows={2} style={{...iStyle,resize:"vertical"}}/>
          </Field>
          <div style={{display:"flex",justifyContent:"flex-end"}}>
            <Btn onClick={()=>setStep(2)}>Next: Build Route →</Btn>
          </div>
        </div>
      )}
      {step===2&&(
        <div>
          <p style={{fontSize:13,color:"var(--muted)",marginBottom:16}}>Build the door-to-door route in order. Each segment is independently assigned to an agent or carrier.</p>
          <SegmentBuilder segments={segs} onChange={setSegs}/>
          {err&&<div style={{background:"#ef444418",border:"1px solid #ef444440",borderRadius:7,padding:"9px 12px",fontSize:13,color:"var(--danger)",marginTop:12}}>⚠ {err}</div>}
          <div style={{display:"flex",gap:10,marginTop:20,justifyContent:"space-between"}}>
            <Btn variant="ghost" onClick={()=>setStep(1)}>← Back</Btn>
            <Btn onClick={create} disabled={busy||!segs.length}>
              {busy?"Creating…":`✓ Create Order (${segs.length} segment${segs.length!==1?"s":""})`}
            </Btn>
          </div>
        </div>
      )}
    </Modal>
  );
};

// ── ORDER DETAIL ─────────────────────────────────────────────────
const OrderDetail=({orderId,onBack})=>{
  const{userProfile}=useApp();
  const[order,setOrder]=useState(null);
  const[segments,setSegs]=useState([]);
  const[agents,setAgents]=useState([]);
  const[assigning,setAssigning]=useState(null);
  const[selAgent,setSelAgent]=useState("");

  useEffect(()=>{
    const u=db.collection("orders").doc(orderId).onSnapshot(s=>{if(s.exists)setOrder({id:s.id,...s.data()});});
    return u;
  },[orderId]);

  useEffect(()=>{
    if(!order?.segmentIds?.length)return;
    const map={};
    const us=order.segmentIds.map(sid=>
      db.collection("segments").doc(sid).onSnapshot(s=>{
        if(s.exists){map[sid]={id:s.id,...s.data()};setSegs(Object.values(map).sort((a,b)=>a.segmentIndex-b.segmentIndex));}
      })
    );
    return()=>us.forEach(u=>u());
  },[order?.segmentIds?.join(",")]);

  useEffect(()=>{
    db.collection("users").where("role","in",["agent","carrier"]).get()
      .then(s=>setAgents(s.docs.map(d=>({id:d.id,...d.data()}))));
  },[]);

  const assign=async sid=>{
    if(!selAgent)return;
    await db.collection("segments").doc(sid).update({assignedTo:selAgent,status:"ASSIGNED",updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    setAssigning(null);setSelAgent("");
  };
  const setOrdStatus=s=>db.collection("orders").doc(orderId).update({status:s,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});

  if(!order)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",padding:80,gap:12}}><Spinner/><span style={{color:"var(--muted)"}}>Loading…</span></div>;

  return(
    <div style={{padding:"24px 28px",maxWidth:880,margin:"0 auto"}} className="fade-in">
      <div style={{display:"flex",gap:14,alignItems:"flex-start",marginBottom:24}}>
        <button onClick={onBack} style={{background:"none",border:"1px solid var(--border)",borderRadius:7,padding:"6px 12px",color:"var(--muted)",cursor:"pointer",fontSize:13,flexShrink:0,marginTop:4}}>← Orders</button>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <h2 style={{fontFamily:"var(--font-d)",fontSize:22,fontWeight:800}}>
              <span style={{color:"var(--primary)",fontFamily:"var(--font-m)"}}>{order.trackingNumber}</span>
            </h2>
            <Badge status={order.status}/>
            <span style={{fontSize:10,padding:"2px 8px",borderRadius:4,fontWeight:700,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:".06em",background:svcColor(order.serviceType)+"20",color:svcColor(order.serviceType),border:`1px solid ${svcColor(order.serviceType)}45`}}>{order.serviceType}</span>
          </div>
          <p style={{color:"var(--muted)",fontSize:13,marginTop:4}}>{order.customer?.company?`${order.customer.company} · `:""}{order.customer?.name} · {fmtDate(order.createdAt)}</p>
        </div>
        {userProfile?.role==="dispatcher"&&(
          <div style={{display:"flex",gap:8,flexShrink:0,flexWrap:"wrap"}}>
            <Btn size="sm" variant="ghost"   onClick={()=>setOrdStatus("IN_TRANSIT")}>In Transit</Btn>
            <Btn size="sm" variant="success" onClick={()=>setOrdStatus("DELIVERED")}>Delivered</Btn>
            <Btn size="sm" variant="danger"  onClick={()=>setOrdStatus("EXCEPTION")}>Exception</Btn>
          </div>
        )}
      </div>

      <div className="grid-2" style={{marginBottom:24}}>
        <Card>
          <div style={{fontSize:10,color:"var(--muted)",fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:10}}>Customer</div>
          <div style={{fontWeight:700,fontSize:15}}>{order.customer?.name}</div>
          <div style={{color:"var(--muted)",fontSize:13}}>{order.customer?.company}</div>
          <div style={{color:"var(--muted)",fontSize:13}}>{order.customer?.email}</div>
          <div style={{color:"var(--muted)",fontSize:13}}>{order.customer?.phone}</div>
        </Card>
        <Card>
          <div style={{fontSize:10,color:"var(--muted)",fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:10}}>Route & Package</div>
          <div style={{display:"flex",alignItems:"center",gap:8,fontWeight:700,fontSize:15,marginBottom:6}}>
            {order.origin?.city}, {order.origin?.state}
            <span style={{color:"var(--primary)",fontSize:18}}>→</span>
            {order.destination?.city}, {order.destination?.state}
          </div>
          <div style={{color:"var(--muted)",fontSize:12}}>{order.origin?.address}</div>
          <div style={{color:"var(--muted)",fontSize:12}}>{order.destination?.address}</div>
          <div style={{color:"var(--text2)",fontSize:12,marginTop:8}}>{order.pieces} piece{order.pieces!==1?"s":""} · {order.weight?`${order.weight} lbs`:"weight TBD"}</div>
        </Card>
      </div>

      <h3 style={{fontFamily:"var(--font-d)",fontSize:16,fontWeight:700,marginBottom:18}}>
        Shipment Route — {segments.length} Segment{segments.length!==1?"s":""}
      </h3>

      {segments.map((seg,idx)=>{
        const ti=SEG_TYPES[seg.type]||{};
        const agent=agents.find(a=>a.id===seg.assignedTo);
        const isActive=seg.status==="EN_ROUTE"||seg.status==="IN_PROGRESS";
        const isLast=idx===segments.length-1;
        return(
          <div key={seg.id} style={{display:"flex",gap:14,marginBottom:isLast?0:4}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:36,flexShrink:0}}>
              <div style={{width:36,height:36,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
                background:seg.status==="COMPLETED"?"#22c55e20":ti.color+"18",
                border:`2.5px solid ${seg.status==="COMPLETED"?"#22c55e":seg.status==="DELAYED"?"var(--danger)":ti.color}`,
                fontSize:14,animation:isActive?"pulse 2s ease-in-out infinite":"none"}}>
                {seg.status==="COMPLETED"?"✓":ti.icon}
              </div>
              {!isLast&&<div style={{width:2,flex:1,minHeight:24,background:seg.status==="COMPLETED"?"#22c55e40":"var(--border)",marginTop:4}}/>}
            </div>
            <div style={{flex:1,paddingBottom:isLast?0:10}}>
              <Card>
                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8,marginBottom:10,flexWrap:"wrap"}}>
                  <div>
                    <span style={{fontWeight:700,fontSize:14}}>Seg {idx+1}: {ti.icon} {ti.label}</span>
                    {agent&&<span style={{fontSize:12,color:"var(--text2)",marginLeft:10}}>👤 {agent.name}</span>}
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
                    <Badge status={seg.status} type="segment"/>
                    {userProfile?.role==="dispatcher"&&seg.status!=="COMPLETED"&&(
                      <Btn size="xs" variant="ghost" onClick={()=>{setAssigning(assigning===seg.id?null:seg.id);setSelAgent("");}}>
                        {agent?"↻ Reassign":"+ Assign"}
                      </Btn>
                    )}
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:13,color:"var(--muted)"}}>
                  <span>From: <strong style={{color:"var(--text)"}}>{seg.fromLocation||"—"}</strong></span>
                  <span>To: <strong style={{color:"var(--text)"}}>{seg.toLocation||"—"}</strong></span>
                  {seg.flightNumber&&<span>Flight: <strong style={{color:"var(--primary)",fontFamily:"var(--font-m)"}}>{seg.flightNumber}</strong>{seg.departureAirport&&<span style={{color:"var(--muted)"}}> ({seg.departureAirport}→{seg.arrivalAirport})</span>}</span>}
                  {seg.scheduledDeparture&&<span>Scheduled: <strong style={{color:"var(--text)"}}>{new Date(seg.scheduledDeparture).toLocaleString()}</strong></span>}
                </div>
                {seg.notes&&<p style={{fontSize:12,color:"var(--muted)",fontStyle:"italic",marginTop:6}}>📝 {seg.notes}</p>}
                {assigning===seg.id&&(
                  <div style={{display:"flex",gap:8,marginTop:12,padding:"10px 12px",background:"var(--surface2)",borderRadius:7}}>
                    <select value={selAgent} onChange={e=>setSelAgent(e.target.value)} style={{...iStyle,flex:1}}>
                      <option value="">Select agent…</option>
                      {agents.map(a=><option key={a.id} value={a.id}>{a.name} ({a.role})</option>)}
                    </select>
                    <Btn size="sm" onClick={()=>assign(seg.id)} disabled={!selAgent}>Assign</Btn>
                    <Btn size="sm" variant="ghost" onClick={()=>setAssigning(null)}>Cancel</Btn>
                  </div>
                )}
                {seg.type==="FLIGHT_LEG"&&seg.flightNumber&&<FlightPanel flightNumber={seg.flightNumber}/>}
              </Card>
            </div>
          </div>
        );
      })}
      {segments.length===0&&<p style={{color:"var(--muted)",fontSize:13,fontStyle:"italic"}}>No segments defined.</p>}
      {order.notes&&<Card style={{marginTop:20,borderLeft:"3px solid var(--accent)"}}><div style={{fontSize:10,color:"var(--muted)",fontFamily:"var(--font-m)",textTransform:"uppercase",marginBottom:6}}>Order Notes</div><p style={{fontSize:13,color:"var(--text2)"}}>{order.notes}</p></Card>}
    </div>
  );
};

// ── DISPATCHER APP ───────────────────────────────────────────────
const DispatcherApp=()=>{
  const{userProfile,handleSignOut}=useApp();
  const[view,setView]=useState("orders");
  const[orders,setOrders]=useState([]);
  const[selOrder,setSel]=useState(null);
  const[showNew,setShowNew]=useState(false);
  const[search,setSearch]=useState("");
  const[fStatus,setFS]=useState("ALL");

                <p style={{color:"var(--muted)",fontSize:13,marginTop:2}}>{orders.length} total · {filtered.length} shown</p>

              <Btn onClick={()=>setShowNew(true)}>+ New Order</Btn>

            <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search tracking #, name, company…" style={{...iStyle,flex:"1 1 200px",minWidth:180}}/>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {["ALL",...Object.keys(ORD_STATUS)].map(s=>(
                  <button key={s} onClick={()=>setFS(s)} style={{padding:"6px 12px",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"var(--font-m)",background:fStatus===s?"var(--primary)":"var(--surface)",color:fStatus===s?"#000":"var(--muted)",border:`1px solid ${fStatus===s?"var(--primary)":"var(--border)"}`}}>{s}</button>

            </div>
            <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius)",overflow:"hidden"}}>

// ── AGENT APP ────────────────────────────────────────────────────
const AgentApp=()=>{
  const{user,userProfile,handleSignOut}=useApp();
  const[segments,setSegs]=useState([]);
  const[orders,setOrds]=useState({});
  const[updating,setUpd]=useState(null);

  useEffect(()=>{
    if(!user)return;
    return db.collection("segments").where("assignedTo","==",user.uid).where("status","in",["ASSIGNED","EN_ROUTE","IN_PROGRESS"])
      .onSnapshot(async snap=>{
        const segs=snap.docs.map(d=>({id:d.id,...d.data()}));
        setSegs(segs);
        const ids=[...new Set(segs.map(s=>s.orderId))];
        const map={};
        await Promise.all(ids.map(async id=>{const d=await db.collection("orders").doc(id).get();if(d.exists)map[id]={id:d.id,...d.data()};}));
        setOrds(map);
      });
  },[user]);

  const ACTIONS={
    ASSIGNED:   {next:"EN_ROUTE",   label:"🚗  Start — En Route",   color:"#f59e0b"},
    EN_ROUTE:   {next:"IN_PROGRESS",label:"📦  Arrived / Picked Up", color:"#f97316"},
    IN_PROGRESS:{next:"COMPLETED",  label:"✅  Mark Completed",       color:"#22c55e"},
  };

  const updateStatus=async seg=>{
    const a=ACTIONS[seg.status];if(!a)return;
    setUpd(seg.id);
    try{
      await db.collection("segments").doc(seg.id).update({
        status:a.next,
        history:firebase.firestore.FieldValue.arrayUnion({status:a.next,timestamp:new Date().toISOString(),updatedBy:user.uid,agentName:userProfile?.name}),
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      if(a.next==="COMPLETED")
        await db.collection("orders").doc(seg.orderId).update({status:"IN_TRANSIT",updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    }finally{setUpd(null);}
  };

  return(
    <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",paddingBottom:32}}>
      <div style={{padding:"14px 18px",background:"var(--surface)",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:10,boxShadow:"0 2px 12px rgba(0,0,0,.4)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}>✈</span>
          <div>
            <div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:16}}>Air<span style={{color:"var(--primary)"}}>TMS</span></div>
            <div style={{fontSize:10,color:"var(--muted)",fontFamily:"var(--font-m)"}}>{userProfile?.role?.toUpperCase()} · {userProfile?.name}</div>
          </div>
        </div>
        <button onClick={handleSignOut} style={{background:"none",border:"1px solid var(--border)",borderRadius:6,color:"var(--muted)",padding:"5px 10px",fontSize:12,cursor:"pointer"}}>Sign Out</button>
      </div>
      <div style={{padding:"20px 16px"}}>
        <h2 style={{fontFamily:"var(--font-d)",fontSize:18,fontWeight:700,marginBottom:3}}>My Assignments</h2>
        <p style={{color:"var(--muted)",fontSize:13,marginBottom:20}}>{segments.length} active segment{segments.length!==1?"s":""}</p>
        {segments.length===0&&(
          <div style={{textAlign:"center",padding:"64px 24px",color:"var(--muted)"}} className="fade-in">
            <div style={{fontSize:52,marginBottom:16}}>📭</div>
            <p style={{fontSize:16,fontWeight:700,marginBottom:8}}>No Active Assignments</p>
            <p style={{fontSize:13}}>A dispatcher will assign you to a segment soon.</p>
          </div>
        )}
        {segments.map(seg=>{
          const order=orders[seg.orderId];
          const ti=SEG_TYPES[seg.type]||{};
          const action=ACTIONS[seg.status];
          const isCrit=order?.serviceType==="CRITICAL";
          return(
            <div key={seg.id} className="fade-in" style={{background:"var(--surface)",borderRadius:14,border:"1px solid var(--border)",borderLeft:`4px solid ${ti.color||"var(--primary)"}`,padding:18,marginBottom:16,boxShadow:isCrit?"0 0 20px rgba(239,68,68,.15)":"none"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontFamily:"var(--font-m)",fontSize:13,color:"var(--primary)",fontWeight:700}}>{order?.trackingNumber||"…"}</span>
                  {isCrit&&<span style={{fontSize:10,background:"#ef444420",color:"#ef4444",padding:"2px 7px",borderRadius:4,fontWeight:800,fontFamily:"var(--font-m)",border:"1px solid #ef444440",animation:"blink 1.5s ease-in-out infinite"}}>CRITICAL</span>}
                </div>
                <Badge status={seg.status} type="segment"/>
              </div>
              <h4 style={{fontWeight:800,fontSize:16,marginBottom:12}}>{ti.icon} {ti.label}</h4>
              <div style={{fontSize:13,color:"var(--text2)",display:"flex",flexDirection:"column",gap:5,marginBottom:14}}>
                <div><span style={{color:"var(--muted)",fontSize:12}}>FROM </span><strong>{seg.fromLocation||"—"}</strong></div>
                <div><span style={{color:"var(--muted)",fontSize:12}}>TO </span><strong>{seg.toLocation||"—"}</strong></div>
                {order?.customer&&<div><span style={{color:"var(--muted)",fontSize:12}}>CUSTOMER </span>{order.customer.name}{order.customer.company?` · ${order.customer.company}`:""}</div>}
                {seg.flightNumber&&<div><span style={{color:"var(--muted)",fontSize:12}}>FLIGHT </span><strong style={{color:"var(--primary)",fontFamily:"var(--font-m)"}}>{seg.flightNumber}</strong>{seg.departureAirport&&<span style={{color:"var(--muted)",fontSize:12}}> ({seg.departureAirport}→{seg.arrivalAirport})</span>}</div>}
                {seg.notes&&<div style={{fontStyle:"italic",color:"var(--muted)",fontSize:12}}>📝 {seg.notes}</div>}
              </div>
              {seg.type==="FLIGHT_LEG"&&seg.flightNumber&&<FlightPanel flightNumber={seg.flightNumber}/>}
              {action&&(
                <button onClick={()=>updateStatus(seg)} disabled={updating===seg.id}
                  style={{width:"100%",padding:"16px",borderRadius:10,border:"none",background:action.color,color:"#000",fontWeight:800,fontSize:15,cursor:updating===seg.id?"not-allowed":"pointer",marginTop:14,fontFamily:"var(--font-b)",opacity:updating===seg.id?.6:1,transition:"transform .1s"}}
                  onMouseDown={e=>{if(updating!==seg.id)e.currentTarget.style.transform="scale(.98)"}}
                  onMouseUp={e=>e.currentTarget.style.transform=""}>
                  {updating===seg.id?"⏳ Updating…":action.label}
                </button>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
};

// ── CARRIER APP ──────────────────────────────────────────────────
const CarrierApp=()=>{
  const{user,userProfile,handleSignOut}=useApp();
  const[segments,setSegs]=useState([]);
  const[orders,setOrds]=useState({});
  const[busy,setBusy]=useState(null);

  useEffect(()=>{
    if(!user)return;
    return db.collection("segments").where("assignedTo","==",user.uid).onSnapshot(async snap=>{
      const segs=snap.docs.map(d=>({id:d.id,...d.data()}));
      setSegs(segs);
      const ids=[...new Set(segs.map(s=>s.orderId))];
      const map={};
      await Promise.all(ids.map(async id=>{const d=await db.collection("orders").doc(id).get();if(d.exists)map[id]={id:d.id,...d.data()};}));
      setOrds(map);
    });
  },[user]);

  const update=async(segId,orderId,status,note)=>{
    setBusy(segId);
    try{
      await db.collection("segments").doc(segId).update({status,history:firebase.firestore.FieldValue.arrayUnion({status,timestamp:new Date().toISOString(),updatedBy:user.uid,note}),updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
      if(status==="COMPLETED")await db.collection("orders").doc(orderId).update({status:"IN_TRANSIT",updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    }finally{setBusy(null);}
  };

  const active=segments.filter(s=>s.status!=="COMPLETED");
  const done=segments.filter(s=>s.status==="COMPLETED");

  return(
    <div style={{maxWidth:600,margin:"0 auto",minHeight:"100vh",paddingBottom:32}}>
      <div style={{padding:"14px 18px",background:"var(--surface)",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span>✈</span>
          <div>
            <div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:16}}>Air<span style={{color:"var(--primary)"}}>TMS</span></div>
            <div style={{fontSize:10,color:"var(--muted)",fontFamily:"var(--font-m)"}}>CARRIER · {userProfile?.name}</div>
          </div>
        </div>
        <button onClick={handleSignOut} style={{background:"none",border:"1px solid var(--border)",borderRadius:6,color:"var(--muted)",padding:"5px 10px",fontSize:12,cursor:"pointer"}}>Sign Out</button>
      </div>
      <div style={{padding:"20px 16px"}}>
        <h2 style={{fontFamily:"var(--font-d)",fontSize:18,fontWeight:700,marginBottom:3}}>Flight Manifest</h2>
        <p style={{color:"var(--muted)",fontSize:13,marginBottom:20}}>{active.length} active · {done.length} completed</p>
        {active.length===0&&<div style={{textAlign:"center",padding:"64px 24px",color:"var(--muted)"}}><div style={{fontSize:52,marginBottom:16}}>✈</div><p style={{fontSize:16,fontWeight:700}}>No Active Assignments</p></div>}
        {active.map(seg=>{
          const order=orders[seg.orderId];
          const ti=SEG_TYPES[seg.type]||{};
          return(
            <Card key={seg.id} style={{marginBottom:16,borderLeft:`4px solid ${ti.color||"var(--primary)"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                <span style={{fontFamily:"var(--font-m)",fontSize:13,color:"var(--primary)",fontWeight:700}}>{order?.trackingNumber}</span>
                <Badge status={seg.status} type="segment"/>
              </div>
              <h4 style={{fontWeight:700,fontSize:15,marginBottom:10}}>{ti.icon} {ti.label}</h4>
              {seg.flightNumber&&(
                <div style={{marginBottom:12}}>
                  <p style={{fontSize:13,color:"var(--text2)",marginBottom:4}}>Flight: <strong style={{color:"var(--primary)",fontFamily:"var(--font-m)"}}>{seg.flightNumber}</strong>{seg.departureAirport&&<span> · {seg.departureAirport}→{seg.arrivalAirport}</span>}</p>
                  {seg.scheduledDeparture&&<p style={{fontSize:12,color:"var(--muted)"}}>Scheduled: {new Date(seg.scheduledDeparture).toLocaleString()}</p>}
                  <FlightPanel flightNumber={seg.flightNumber}/>
                </div>
              )}
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:12}}>
                {seg.status==="ASSIGNED"&&<Btn size="sm" onClick={()=>update(seg.id,seg.orderId,"IN_PROGRESS","Checked in")} disabled={busy===seg.id}>✓ Check-In Received</Btn>}
                {seg.status==="IN_PROGRESS"&&<>
                  <Btn size="sm" variant="success" onClick={()=>update(seg.id,seg.orderId,"COMPLETED","Boarded")} disabled={busy===seg.id}>✈ Boarded / Handed Off</Btn>
                  <Btn size="sm" variant="danger"  onClick={()=>update(seg.id,seg.orderId,"DELAYED","Flight delayed")} disabled={busy===seg.id}>⚠ Mark Delayed</Btn>
                </>}
                {seg.status==="DELAYED"&&<Btn size="sm" variant="warning" onClick={()=>update(seg.id,seg.orderId,"IN_PROGRESS","Resumed")} disabled={busy===seg.id}>↻ Resume</Btn>}
              </div>
            </Card>
          );
        })}
        {done.length>0&&<>
          <Divider label="Completed"/>
          {done.map(seg=>{const o=orders[seg.orderId];const ti=SEG_TYPES[seg.type]||{};return<Card key={seg.id} style={{marginBottom:10,opacity:.65}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontFamily:"var(--font-m)",fontSize:12,color:"var(--muted)"}}>{o?.trackingNumber} · {ti.icon} {ti.label}</span><Badge status="COMPLETED" type="segment"/></div></Card>;})}
        </>}
      </div>
    </div>
  );
};

// ── CUSTOMER TRACKING PAGE ───────────────────────────────────────
const TrackingPage=({init})=>{
  const{userProfile,handleSignOut}=useApp();
  const[tn,setTn]=useState(init||"");
  const[order,setOrder]=useState(null);
  const[segs,setSegs]=useState([]);
  const[loading,setLoad]=useState(false);
  const[error,setError]=useState("");

  const doSearch=async()=>{
    const q=tn.trim().toUpperCase();
    if(!q)return;
    setLoad(true);setError("");setOrder(null);setSegs([]);
    try{
      const snap=await db.collection("orders").where("trackingNumber","==",q).get();
      if(snap.empty){setError("No shipment found for that tracking number.");setLoad(false);return;}
      const doc=snap.docs[0];
      const ord={id:doc.id,...doc.data()};
      setOrder(ord);
      if(ord.segmentIds?.length){
        const docs=await Promise.all(ord.segmentIds.map(id=>db.collection("segments").doc(id).get()));
        setSegs(docs.filter(d=>d.exists).map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.segmentIndex-b.segmentIndex));
      }
    }catch(e){setError(e.message);}
    setLoad(false);
  };
  useEffect(()=>{if(init)doSearch();},[]);

  const pct=()=>{if(!segs.length)return 0;return Math.round(segs.filter(s=>s.status==="COMPLETED").length/segs.length*100);};

  return(
    <div style={{maxWidth:660,margin:"0 auto",padding:"40px 20px 60px",minHeight:"100vh"}}>
      <div style={{textAlign:"center",marginBottom:36}}>
        <div style={{display:"inline-flex",alignItems:"center",gap:10,marginBottom:6}}>
          <span style={{fontSize:26}}>✈</span>
          <span style={{fontFamily:"var(--font-d)",fontSize:26,fontWeight:800}}>Air<span style={{color:"var(--primary)"}}>TMS</span></span>
        </div>
        <p style={{color:"var(--muted)",fontSize:14}}>Shipment Tracking</p>
      </div>
      <div style={{display:"flex",gap:10,marginBottom:28}}>
        <input value={tn} onChange={e=>setTn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSearch()}
          placeholder="Enter tracking number — e.g. ACX24ABCDE123"
          style={{...iStyle,flex:1,fontFamily:"var(--font-m)",fontSize:14,letterSpacing:".04em",padding:"12px 16px"}}/>
        <Btn onClick={doSearch} disabled={loading} size="lg">{loading?"…":"Track"}</Btn>
      </div>
      {error&&<div style={{background:"#ef444418",border:"1px solid #ef444440",borderRadius:8,padding:"12px 16px",color:"var(--danger)",marginBottom:20,fontSize:14}}>⚠ {error}</div>}
      {loading&&<div style={{display:"flex",justifyContent:"center",padding:"40px"}}><Spinner size={36}/></div>}
      {order&&!loading&&(
        <div className="fade-in">
          <Card style={{marginBottom:24}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
              <div>
                <div style={{fontFamily:"var(--font-m)",fontSize:22,fontWeight:800,color:"var(--primary)",letterSpacing:".05em"}}>{order.trackingNumber}</div>
                <div style={{color:"var(--muted)",fontSize:13,marginTop:3}}>{order.customer?.name}{order.customer?.company?` · ${order.customer.company}`:""} · {fmtDate(order.createdAt)}</div>
              </div>
              <Badge status={order.status}/>
            </div>
            <div style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--muted)",marginBottom:5,fontFamily:"var(--font-m)"}}><span>PROGRESS</span><span>{pct()}% COMPLETE</span></div>
              <div style={{height:6,background:"var(--surface2)",borderRadius:3,overflow:"hidden"}}>
                <div style={{width:`${pct()}%`,height:"100%",background:"linear-gradient(90deg,#0284c7,var(--primary))",borderRadius:3,transition:"width .5s ease"}}/>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,fontSize:13}}>
              <div>
                <div style={{color:"var(--muted)",fontSize:11,marginBottom:3,fontFamily:"var(--font-m)"}}>ORIGIN</div>
                <div style={{fontWeight:700}}>{order.origin?.city}, {order.origin?.state}</div>
                <div style={{color:"var(--muted)",fontSize:12}}>{order.origin?.address}</div>
              </div>
              <div>
                <div style={{color:"var(--muted)",fontSize:11,marginBottom:3,fontFamily:"var(--font-m)"}}>DESTINATION</div>
                <div style={{fontWeight:700}}>{order.destination?.city}, {order.destination?.state}</div>
                <div style={{color:"var(--muted)",fontSize:12}}>{order.destination?.address}</div>
              </div>
            </div>
          </Card>
          <h3 style={{fontFamily:"var(--font-d)",fontSize:15,fontWeight:700,marginBottom:16}}>Shipment Journey</h3>
          {segs.map((seg,idx)=>{
            const ti=SEG_TYPES[seg.type]||{};
            const si=SEG_STATUS[seg.status]||{};
            const isActive=seg.status==="EN_ROUTE"||seg.status==="IN_PROGRESS";
            const isLast=idx===segs.length-1;
            return(
              <div key={seg.id} style={{display:"flex",gap:12,marginBottom:isLast?0:6}}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:34,flexShrink:0}}>
                  <div style={{width:34,height:34,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:seg.status==="COMPLETED"?"#22c55e18":isActive?ti.color+"18":"var(--surface2)",border:`2.5px solid ${seg.status==="COMPLETED"?"#22c55e":isActive?ti.color:"var(--border)"}`,fontSize:14,animation:isActive?"pulse 2s ease-in-out infinite":"none"}}>
                    {seg.status==="COMPLETED"?"✓":ti.icon}
                  </div>
                  {!isLast&&<div style={{width:2,flex:1,minHeight:20,background:seg.status==="COMPLETED"?"#22c55e40":"var(--border)",marginTop:4}}/>}
                </div>
                <div style={{flex:1,paddingBottom:isLast?0:10}}>
                  <Card style={{borderLeft:`3px solid ${si.color||ti.color||"var(--border)"}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <span style={{fontWeight:700,fontSize:14}}>{ti.label}</span>
                      <Badge status={seg.status} type="segment"/>
                    </div>
                    <div style={{fontSize:13,color:"var(--muted)"}}>
                      {seg.fromLocation} <span style={{color:"var(--primary)"}}>→</span> {seg.toLocation}
                      {seg.flightNumber&&<span style={{marginLeft:8,color:"var(--primary)",fontFamily:"var(--font-m)",fontWeight:700}}> ✈ {seg.flightNumber}</span>}
                    </div>
                    {isActive&&seg.type==="FLIGHT_LEG"&&seg.flightNumber&&<FlightPanel flightNumber={seg.flightNumber}/>}
                  </Card>
                </div>
              </div>
            );
          })}
        </div>
      )}
      <div style={{textAlign:"center",marginTop:40}}>
        {userProfile?(
          <button onClick={handleSignOut} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:13,textDecoration:"underline"}}>Sign Out</button>
        ):(
          <p style={{color:"var(--muted)",fontSize:13}}>Are you staff? <button onClick={()=>window.location.hash=""} style={{background:"none",border:"none",color:"var(--primary)",cursor:"pointer",textDecoration:"underline",fontSize:13}}>Sign In</button></p>
        )}
      </div>
    </div>
  );
};

// ── AUTH SCREEN ──────────────────────────────────────────────────
const AuthScreen=()=>{
  const[mode,setMode]=useState("login");
  const[email,setEmail]=useState("");
  const[pass,setPass]=useState("");
  const[name,setName]=useState("");
  const[role,setRole]=useState("agent");
  const[error,setError]=useState("");
  const[busy,setBusy]=useState(false);

  const doLogin=async()=>{setBusy(true);setError("");try{await auth.signInWithEmailAndPassword(email,pass);}catch(e){setError(e.message);setBusy(false);}};
  const doRegister=async()=>{if(!name.trim()){setError("Name required.");return;}setBusy(true);setError("");try{const c=await auth.createUserWithEmailAndPassword(email,pass);await db.collection("users").doc(c.user.uid).set({email,name:name.trim(),role,createdAt:firebase.firestore.FieldValue.serverTimestamp(),isActive:true});}catch(e){setError(e.message);setBusy(false);}};

  const roles=[
    {v:"dispatcher",e:"🖥",l:"Dispatcher",  d:"Manage orders & assign agents"},
    {v:"agent",     e:"🚗",l:"Field Agent",  d:"Ground pickup & delivery"},
    {v:"carrier",   e:"✈", l:"Carrier Agent",d:"Airport handoffs & flight ops"},
    {v:"customer",  e:"📦",l:"Customer",     d:"Track my shipments"},
  ];

  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16,backgroundImage:"radial-gradient(ellipse at 15% 50%,rgba(56,189,248,0.07) 0%,transparent 55%),radial-gradient(ellipse at 85% 10%,rgba(245,158,11,0.05) 0%,transparent 45%)"}}>
      <div style={{width:"100%",maxWidth:420}} className="fade-in">
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:10,marginBottom:6}}>
            <div style={{width:46,height:46,background:"linear-gradient(135deg,var(--primary),#0284c7)",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,boxShadow:"0 0 24px var(--primary-glow)"}}>✈</div>
            <span style={{fontFamily:"var(--font-d)",fontSize:28,fontWeight:800,letterSpacing:"-.02em"}}>Air<span style={{color:"var(--primary)"}}>TMS</span></span>
          </div>
          <p style={{color:"var(--muted)",fontSize:13}}>Air Courier Transportation Management</p>
        </div>
        <div style={{display:"flex",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:9,padding:4,marginBottom:20}}>
          {[["login","Sign In"],["register","Register"]].map(([m,l])=>(
            <button key={m} onClick={()=>{setMode(m);setError("");}} style={{flex:1,padding:9,borderRadius:7,border:"none",cursor:"pointer",background:mode===m?"var(--primary)":"transparent",color:mode===m?"#000":"var(--muted)",fontFamily:"var(--font-b)",fontWeight:700,fontSize:14,transition:"all .15s"}}>{l}</button>
          ))}
        </div>
        <Card style={{display:"flex",flexDirection:"column",gap:14}}>
          {mode==="register"&&<TI label="Full Name" value={name} onChange={setName} placeholder="Your full name" required/>}
          <TI label="Email" value={email} onChange={setEmail} type="email" placeholder="you@company.com" required/>
          <TI label="Password" value={pass} onChange={setPass} type="password" placeholder="········" required/>
          {mode==="register"&&(
            <Field label="I am a..." required>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {roles.map(r=>(
                  <button key={r.v} onClick={()=>setRole(r.v)} style={{padding:"10px 12px",borderRadius:8,cursor:"pointer",textAlign:"left",background:role===r.v?"var(--primary-dim)":"var(--surface2)",border:`2px solid ${role===r.v?"var(--primary)":"var(--border)"}`,color:"var(--text)",transition:"all .12s"}}>
                    <div style={{fontSize:15,fontWeight:700}}>{r.e} {r.l}</div>
                    <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{r.d}</div>
                  </button>
                ))}
              </div>
            </Field>
          )}
          {error&&<div style={{background:"#ef444418",border:"1px solid #ef444440",borderRadius:7,padding:"9px 12px",fontSize:13,color:"var(--danger)"}}>⚠ {error}</div>}
          <Btn onClick={mode==="login"?doLogin:doRegister} disabled={busy} size="lg" full>{busy?"Please wait…":mode==="login"?"Sign In →":"Create Account →"}</Btn>
        </Card>
        <p style={{textAlign:"center",marginTop:16,fontSize:13,color:"var(--muted)"}}>
          Tracking a shipment?{" "}
          <button onClick={()=>window.location.hash="#track"} style={{background:"none",border:"none",color:"var(--primary)",cursor:"pointer",textDecoration:"underline",fontSize:13}}>Track without login</button>
        </p>
      </div>
    </div>
  );
};

// ── SETUP NOTICE ─────────────────────────────────────────────────
const SetupNotice=()=>(
  <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:24}}>
    <div style={{maxWidth:520,width:"100%"}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{fontSize:40,marginBottom:12}}>✈</div>
        <h1 style={{fontFamily:"var(--font-d)",fontSize:30,fontWeight:800,marginBottom:6}}>Air<span style={{color:"var(--primary)"}}>TMS</span></h1>
        <p style={{color:"var(--text2)",fontSize:14}}>Air Courier Transportation Management System</p>
      </div>
      <Card style={{borderLeft:"3px solid var(--accent)"}}>
        <h3 style={{fontFamily:"var(--font-d)",fontSize:16,fontWeight:700,marginBottom:12,color:"var(--accent)"}}>⚙ Firebase Setup Required</h3>
        <p style={{fontSize:13,color:"var(--text2)",lineHeight:1.7,marginBottom:16}}>
          Open <code style={{fontFamily:"var(--font-m)",background:"var(--surface2)",padding:"1px 6px",borderRadius:4}}>index.html</code> and replace the <code style={{fontFamily:"var(--font-m)",background:"var(--surface2)",padding:"1px 6px",borderRadius:4}}>firebaseConfig</code> object with your credentials.
        </p>
        <div style={{background:"var(--surface2)",borderRadius:8,padding:14,fontSize:12,fontFamily:"var(--font-m)",color:"var(--text2)",lineHeight:1.8}}>
          <div style={{color:"var(--muted)"}}>// 1. console.firebase.google.com → Create project</div>
          <div style={{color:"var(--muted)"}}>// 2. Add Web App → copy config</div>
          <div style={{color:"var(--muted)"}}>// 3. Authentication → Enable Email/Password</div>
          <div style={{color:"var(--muted)"}}>// 4. Firestore → Create database (production mode)</div>
          <div style={{color:"var(--muted)"}}>// 5. Paste config into firebaseConfig above → Save</div>
        </div>
        <p style={{fontSize:12,color:"var(--muted)",marginTop:12}}>See <strong>README.md</strong> for security rules and deployment guide.</p>
      </Card>
    </div>
  </div>
);

// ── ROOT ─────────────────────────────────────────────────────────
const App=()=>{
  const[authState,setAS]=useState("loading");
  const[user,setUser]=useState(null);
  const[userProfile,setUP]=useState(null);
  const[hash,setHash]=useState(window.location.hash);

  useEffect(()=>{const h=()=>setHash(window.location.hash);window.addEventListener("hashchange",h);return()=>window.removeEventListener("hashchange",h);},[]);
  useEffect(()=>{
    if(!IS_CFG){setAS("unconfigured");return;}
    return auth.onAuthStateChanged(async u=>{
      if(u){
        setUser(u);
        try{const d=await db.collection("users").doc(u.uid).get();setUP(d.exists?d.data():null);}catch{setUP(null);}
        setAS("app");
      }else{setUser(null);setUP(null);setAS("auth");}
    });
  },[]);

  const handleSignOut=()=>auth.signOut();
  const ctx={user,userProfile,handleSignOut};

  if(hash==="#track"||hash.startsWith("#track/"))
    return<Ctx.Provider value={ctx}><TrackingPage init={hash.replace("#track/","").replace("#track","")}/></Ctx.Provider>;

  if(authState==="unconfigured")return<SetupNotice/>;
  if(authState==="loading")return<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",gap:20}}><div style={{fontFamily:"var(--font-d)",fontSize:32,fontWeight:800}}>Air<span style={{color:"var(--primary)"}}>TMS</span></div><Spinner size={36}/></div>;
  if(authState==="auth")return<Ctx.Provider value={ctx}><AuthScreen/></Ctx.Provider>;

  const role=userProfile?.role;
  return(
    <Ctx.Provider value={ctx}>
      {role==="dispatcher"&&<DispatcherApp/>}
      {role==="agent"&&<AgentApp/>}
      {role==="carrier"&&<CarrierApp/>}
      {role==="customer"&&<TrackingPage/>}
      {!role&&(
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",flexDirection:"column",gap:14}}>
          <Spinner/><p style={{color:"var(--muted)",fontSize:14}}>Loading profile…</p>
          <button onClick={handleSignOut} style={{background:"none",border:"1px solid var(--border)",borderRadius:6,padding:"6px 14px",color:"var(--muted)",cursor:"pointer",fontSize:13}}>Sign Out</button>
        </div>
      )}
    </Ctx.Provider>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("/sw.js")
      .then(r=>console.log("SW registered:",r.scope))
      .catch(e=>console.warn("SW failed:",e));
  });
}
</script>
</body>
</html>
